<?xml version='1.0'?>
<!DOCTYPE fontconfig SYSTEM 'fonts.dtd'>
<fontconfig>
  <!-- You are supposed to remove all the lines but the one(s) where the font is used in your terminal -->
  <!-- Only monospaced fonts have been listed here -->
  <!-- If your font isnt in the list, uncomment the next line and write its name -->
  <!-- <alias><family>YOUR_TERMINAL_FONT</family><default><family>icons-in-terminal</family></default></alias> -->
  <alias><family>Adobe Courier</family><prefer><family>icons-in-terminal</family></prefer></alias>
  <!-- <alias><family>B&H LucidaTypewriter</family><prefer><family>icons-in-terminal</family></prefer></alias> -->
  <alias><family>cursor.pcf</family><prefer><family>icons-in-terminal</family></prefer></alias>
  <alias><family>deccurs.pcf</family><prefer><family>icons-in-terminal</family></prefer></alias>
  <alias><family>decsess.pcf</family><prefer><family>icons-in-terminal</family></prefer></alias>
  <alias><family>FreeMono</family><prefer><family>icons-in-terminal</family></prefer></alias>
  <alias><family>MesloLGS NF</family><prefer><family>icons-in-terminal</family></prefer></alias>
  <alias><family>micro.pcf</family><prefer><family>icons-in-terminal</family></prefer></alias>
  <alias><family>Source Code Pro</family><prefer><family>icons-in-terminal</family></prefer></alias>
  <alias><family>Source Code Pro,Source Code Pro Black</family><prefer><family>icons-in-terminal</family></prefer></alias>
  <alias><family>Source Code Pro,Source Code Pro ExtraLight</family><prefer><family>icons-in-terminal</family></prefer></alias>
  <alias><family>Source Code Pro,Source Code Pro Light</family><prefer><family>icons-in-terminal</family></prefer></alias>
  <alias><family>Source Code Pro,Source Code Pro Medium</family><prefer><family>icons-in-terminal</family></prefer></alias>
  <alias><family>Source Code Pro,Source Code Pro Semibold</family><prefer><family>icons-in-terminal</family></prefer></alias>
  <alias><family>SourceCodeVF</family><prefer><family>icons-in-terminal</family></prefer></alias>
  <alias><family>UbuntuMono Nerd Font</family><prefer><family>icons-in-terminal</family></prefer></alias>
  <alias><family>UbuntuMono Nerd Font Mono</family><prefer><family>icons-in-terminal</family></prefer></alias>
  <alias><family>Monospace</family><default><family>icons-in-terminal</family></default></alias>
</fontconfig>
